<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación Lancero</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:url('fondo.jpg') center center;

h1{

p{

}

label{

}

select,input{

}

button{

</style>
</head>
<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>Evaluación de Liderazgo</h1>

<p>
Actividad educativa sobre recopilación de información en sitios web.
</p>

<label>Número del 1 al 10</label>
<select id="numero">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<label>Color favorito</label>
<select id="color">
<option>Negro</option>
<option>Azul</option>
<option>Rojo</option>
<option>Verde</option>
<option>Blanco</option>
</select>

<label>Animal</label>
<select id="animal">
<option>Águila</option>
<option>Jaguar</option>
<option>Lobo</option>
<option>Cóndor</option>
</select>

<label>Palabra aleatoria</label>
<input id="palabra" placeholder="Escribe una palabra cualquiera">

<button onclick="guardar()">
Enviar Respuesta
</button>

<div id="estado"></div>

<div class="info">
Al finalizar se mostrará cómo un sitio web puede registrar
la información que decides compartir junto con algunos datos
técnicos básicos del navegador.
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTWJzGTpaplffsPLqVuscmslvO5LpBDlo",
  authDomain: "qr-ph-3711d.firebaseapp.com",
  projectId: "qr-ph-3711d",
  storageBucket: "qr-ph-3711d.firebasestorage.app",
  messagingSenderId: "95440501288",
  appId: "1:95440501288:web:eb13f33c26c5529d06531d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.guardar = async function(){

try{

await addDoc(collection(db,"respuestas"),{

numero: document.getElementById("numero").value,
color: document.getElementById("color").value,
animal: document.getElementById("animal").value,
palabra: document.getElementById("palabra").value,

fecha: new Date().toLocaleString(),

idioma: navigator.language,

plataforma: navigator.platform,

navegador: navigator.userAgent

});

document.getElementById("estado").innerHTML =
"✅ Respuesta registrada correctamente";

}catch(error){

document.getElementById("estado").innerHTML =
"❌ Error: " + error.message;

}

}

</script>

</body>
</html>

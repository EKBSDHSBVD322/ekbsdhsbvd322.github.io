<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Control</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:30px;
}

h1{
color:gold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #444;
padding:10px;
text-align:center;
}

th{
background:gold;
color:black;
}

.contador{
margin-top:10px;
font-size:18px;
}

</style>
</head>
<body>

<h1>Control De Datos</h1>

<div class="contador">
Total respuestas:
<span id="total">0</span>
</div>

<table>

<thead>

<tr>
<th>Número</th>
<th>Color</th>
<th>Animal</th>
<th>Palabra</th>
<th>Idioma</th>
<th>Plataforma</th>
<th>Fecha</th>
</tr>

</thead>

<tbody id="datos"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTWJzGTpaplffsPLqVuscmslvO5LpBDlo",
  authDomain: "qr-ph-3711d.firebaseapp.com",
  projectId: "qr-ph-3711d",
  storageBucket: "qr-ph-3711d.firebasestorage.app",
  messagingSenderId: "95440501288",
  appId: "1:95440501288:web:eb13f33c26c5529d06531d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tabla = document.getElementById("datos");

const consulta = await getDocs(collection(db,"respuestas"));

let total = 0;

consulta.forEach(doc=>{

total++;

const d = doc.data();

tabla.innerHTML += `
<tr>
<td>${d.numero || "-"}</td>
<td>${d.color || "-"}</td>
<td>${d.animal || "-"}</td>
<td>${d.palabra || "-"}</td>
<td>${d.idioma || "-"}</td>
<td>${d.plataforma || "-"}</td>
<td>${d.fecha || "-"}</td>
</tr>
`;

});

document.getElementById("total").innerText = total;

</script>

</body>
</html>
